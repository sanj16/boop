<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      padding: 0;
      overflow-x: hidden;
    }

    .glass-container {
      position: relative;
      padding: 14px 16px;
      background: transparent;
      color: var(--vscode-foreground, #e0e0e0);
      font-size: 12.5px;
      line-height: 1.6;
      min-height: 100px;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .close-btn {
      display: none;
    }

    .file-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      padding-right: 24px;
      opacity: 0.9;
    }

    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      opacity: 0.5;
      margin-bottom: 3px;
      margin-top: 10px;
    }

    .verdict-positive { color: #4ec994; font-weight: 500; font-size: 12px; }
    .verdict-negative { color: #f87171; font-weight: 500; font-size: 12px; }
    .verdict-neutral { color: #fbbf24; font-weight: 500; font-size: 12px; }

    .code-highlight {
      background: rgba(139, 92, 246, 0.15);
      color: #c4b5fd;
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
    }

    .bullet-point {
      display: block;
      padding: 4px 0 4px 12px;
      border-left: 2px solid rgba(255, 255, 255, 0.1);
      margin: 4px 0;
    }

    .personality-reaction {
      font-style: italic;
      opacity: 0.85;
      margin-bottom: 6px;
      display: block;
    }

    .hot-indicator {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }
    .hot-stable { background: rgba(78, 201, 148, 0.15); color: #4ec994; }
    .hot-active { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
    .hot-hot { background: rgba(248, 113, 113, 0.15); color: #f87171; }

    /* Commands section */
    .commands-trigger {
      text-decoration: underline;
      text-decoration-style: dotted;
      cursor: pointer;
      position: relative;
      display: inline-block;
    }

    .commands-trigger:hover .commands-tooltip {
      display: block;
    }

    .commands-tooltip {
      display: none;
      position: absolute;
      left: 0;
      top: 100%;
      margin-top: 4px;
      background: rgba(30, 30, 35, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 8px 0;
      min-width: 220px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .command-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 12px;
      gap: 8px;
    }

    .command-row:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .command-label {
      font-size: 10px;
      opacity: 0.5;
      min-width: 40px;
    }

    .command-text {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      flex: 1;
    }

    .copy-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 10px;
      cursor: pointer;
      color: var(--vscode-foreground, #ccc);
      transition: background 0.2s;
    }

    .copy-btn:hover {
      background: rgba(78, 201, 148, 0.3);
    }

    .copy-btn.copied {
      background: rgba(78, 201, 148, 0.4);
      color: #4ec994;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0.6;
    }

    .loading-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--vscode-foreground, #e0e0e0);
      animation: pulse 1.2s infinite;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    .stream-cursor {
      display: inline-block;
      width: 2px;
      height: 13px;
      background: var(--vscode-foreground, #e0e0e0);
      margin-left: 2px;
      animation: blink 0.8s infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .error {
      color: #f87171;
      padding: 8px;
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 8px;
      background: rgba(248, 113, 113, 0.05);
    }
  </style>
</head>
<body>
  <div class="glass-container">
    <div class="close-btn" id="closeBtn">✕</div>
    <div id="content">
      <div class="loading">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <span style="margin-left: 4px;">Analyzing...</span>
      </div>
    </div>
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    const content = document.getElementById('content');
    let streamBuffer = '';

    document.getElementById('closeBtn').addEventListener('click', () => {
      vscode.postMessage({ type: 'close' });
    });

    window.addEventListener('message', event => {
      const message = event.data;

      switch (message.type) {
        case 'startStream':
          streamBuffer = '';
          const meta = message.metadata ? buildMetadataHtml(message.metadata) : '';
          content.innerHTML = `<div class="file-name">${escapeHtml(message.fileName)}</div>${meta}<div class="stream-content"></div>`;
          break;

        case 'streamChunk':
          streamBuffer += message.text;
          const streamEl = content.querySelector('.stream-content');
          if (streamEl) {
            streamEl.innerHTML = formatBrief(streamBuffer) + '<span class="stream-cursor"></span>';
            window.scrollTo(0, document.body.scrollHeight);
          }
          break;

        case 'endStream':
          const finalEl = content.querySelector('.stream-content');
          if (finalEl) {
            finalEl.innerHTML = formatBrief(streamBuffer);
          }
          break;

        case 'error':
          content.innerHTML = `<div class="error">${escapeHtml(message.text)}</div>`;
          break;

        case 'loading':
          metadataHtml = '';
          content.innerHTML = `
            <div class="file-name">${escapeHtml(message.fileName || '')}</div>
            <div class="loading">
              <div class="loading-dot"></div>
              <div class="loading-dot"></div>
              <div class="loading-dot"></div>
              <span style="margin-left: 4px;">${escapeHtml(message.text || 'Analyzing...')}</span>
            </div>`;
          break;
      }
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function buildMetadataHtml(meta) {
      let html = '';

      // Run commands section
      if (meta.commands && meta.commands.length > 0) {
        const commandRows = meta.commands.map(c => {
          return `<div class="command-row">
            <span class="command-label">${escapeHtml(c.label)}</span>
            <span class="command-text">${escapeHtml(c.command)}</span>
            <button class="copy-btn" onclick="copyCommand(this, '${escapeHtml(c.command).replace(/'/g, "\\'")}')">copy</button>
          </div>`;
        }).join('');

        const entryLabel = meta.mainFile ? `<span style="opacity:0.5;font-size:10px">Entry: ${escapeHtml(meta.mainFile)}</span><br>` : '';
        const firstCmd = meta.commands[0].command;
        html += `<div class="section-label">Run</div>`;
        html += entryLabel;
        html += `<span class="commands-trigger">${escapeHtml(firstCmd)}<div class="commands-tooltip">${commandRows}</div></span><br>`;
      }

      // Hot file status
      if (meta.hotFile) {
        const level = meta.hotFile.level;
        const label = level === 'hot' ? '🔴 Hot' : level === 'active' ? '🟡 Active' : '🟢 Stable';
        const cls = level === 'hot' ? 'hot-hot' : level === 'active' ? 'hot-active' : 'hot-stable';
        html += `<div class="section-label">Status</div>`;
        html += `<span class="hot-indicator ${cls}">${label}</span> <span style="opacity:0.6">${meta.hotFile.commits2Weeks} commits / 2wk, ${meta.hotFile.uniqueAuthors} authors</span><br>`;
      }

      // Owners / experts
      if (meta.owners && meta.owners.length > 0) {
        html += `<div class="section-label">Experts</div>`;
        html += meta.owners.map(o => `${escapeHtml(o.name)} <span style="opacity:0.5">(${o.commits})</span>`).join(', ') + '<br>';
      }

      return html;
    }

    function formatBrief(text) {
      text = text.replace(/\r\n/g, '\n');
      let html = escapeHtml(text);

      // Format inline code (backtick-wrapped) — must be before section headers
      html = html.replace(/`([^`]+)`/g, '<span class="code-highlight">$1</span>');

      // Format section headers (lines starting with ##)
      html = html.replace(/^## (.+)$/gm, '<div class="section-label">$1</div>');

      // Format verdict markers with personality
      html = html.replace(/\[GOOD\]/g, '<span class="verdict-positive">🐶 nice!</span>');
      html = html.replace(/\[WARN\]/g, '<span class="verdict-negative">🐶 hmm, heads up...</span>');
      html = html.replace(/\[NOTE\]/g, '<span class="verdict-neutral">🐶 fyi —</span>');

      // Format bullet points (lines starting with - or •)
      html = html.replace(/^[-•] (.+)$/gm, '<span class="bullet-point">$1</span>');

      // Convert newlines to breaks
      html = html.replace(/\n/g, '<br>');

      return html;
    }

    function copyCommand(btn, cmd) {
      navigator.clipboard.writeText(cmd).then(() => {
        btn.textContent = '✓';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'copy';
          btn.classList.remove('copied');
        }, 1500);
      });
    }
  </script>
</body>
</html>
